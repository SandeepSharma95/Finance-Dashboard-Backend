spring.application.name=finance-dashboard

# Create DB first or use createDatabaseIfNotExist=true below. Set username/password for your MySQL user.
spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your password

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

server.port=8080
server.error.include-message=always


app.jwt.secret=7f3c9e2b1a8d4f6e0c5b9a3d7e1f2c8a4b6d0e9f3c7a1b5d8e2f6c0a4b8d3e7f1
app.jwt.expiration-ms=86400000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.finance.dashboard=INFO
